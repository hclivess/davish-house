<svg viewBox="0 0 1000 16" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <!-- Top line: straight → pinch down → straight -->
  <path d="M0,4 L470,4 L500,14 L530,4 L1000,4"
        fill="none" stroke="#c9a84c" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Bottom line: straight → pinch up → straight -->
  <path d="M0,12 L470,12 L500,2 L530,12 L1000,12"
        fill="none" stroke="#c9a84c" stroke-width="1.8" stroke-linejoin="round"/>
</svg>
